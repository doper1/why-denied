name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ------------------------------------------------------------------------
  # release-please maintains an ongoing "Release PR". Merging it tags a new
  # release and sets release_created=true, which gates the packaging job.
  # ------------------------------------------------------------------------
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: google-github-actions/release-please-action@v4
        with:
          release-type: simple

  # ------------------------------------------------------------------------
  # Build native packages on each target distro using its own container, then
  # upload them to the freshly-created GitHub Release.
  # ------------------------------------------------------------------------
  packages:
    name: Package (${{ matrix.name }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            image: debian:12
            format: deb
          - name: rockylinux
            image: rockylinux:9
            format: rpm
          - name: alpine
            image: alpine:3.20
            format: apk
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (Debian/Ubuntu)
        if: matrix.format == 'deb'
        run: |
          apt-get update
          apt-get install -y build-essential libacl1-dev ruby ruby-dev rpm
          gem install --no-document fpm

      - name: Install toolchain (RHEL/Rocky/Fedora)
        if: matrix.format == 'rpm'
        run: |
          dnf install -y gcc make libacl-devel ruby ruby-devel rpm-build redhat-rpm-config tar
          gem install --no-document fpm

      - name: Install toolchain (Alpine)
        if: matrix.format == 'apk'
        run: |
          apk add --no-cache build-base acl-dev ruby ruby-dev libffi-dev tar
          gem install --no-document fpm

      - name: Build shared library
        run: make all

      - name: Build ${{ matrix.format }} package
        run: ./packager.sh ${{ matrix.format }}

      - name: Upload package to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          # gh may be absent in minimal containers; install when missing.
          if ! command -v gh >/dev/null 2>&1; then
            ( apt-get install -y gh 2>/dev/null ) || \
            ( dnf install -y gh 2>/dev/null ) || \
            ( apk add --no-cache github-cli 2>/dev/null ) || true
          fi
          gh release upload "${TAG}" dist/*.${{ matrix.format }} --clobber
