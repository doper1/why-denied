name: Release

on:
  push:
    branches: [main]
  # Manual trigger to (re)build and attach packages to an existing release tag,
  # e.g. to backfill artifacts onto a release whose packaging run failed.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build packages for (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ------------------------------------------------------------------------
  # release-please maintains an ongoing "Release PR". Merging it tags a new
  # release and sets release_created=true, which gates the packaging job.
  #
  # Configuration lives in release-please-config.json and
  # .release-please-manifest.json (manifest mode is the v4 default; the
  # config-file / manifest-file inputs default to those paths).
  # ------------------------------------------------------------------------
  release-please:
    name: Release PR / tag
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4

  # ------------------------------------------------------------------------
  # Build native packages on each target distro using its own container, then
  # upload them to the GitHub Release. Runs when release-please cut a release,
  # or when manually dispatched against an existing tag.
  # ------------------------------------------------------------------------
  packages:
    name: Package (${{ matrix.name }})
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            image: debian:12
            format: deb
          - name: rockylinux
            image: rockylinux:9
            format: rpm
          - name: alpine
            image: alpine:3.20
            format: apk
    container:
      image: ${{ matrix.image }}
    env:
      TAG: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (Debian/Ubuntu)
        if: matrix.format == 'deb'
        run: |
          apt-get update
          apt-get install -y build-essential libacl1-dev ruby ruby-dev rpm
          gem install --no-document fpm

      - name: Install toolchain (RHEL/Rocky/Fedora)
        if: matrix.format == 'rpm'
        run: |
          # The rockylinux:9 image ships a prebuilt dnf cache that can be stale
          # relative to the live 9.x repos; that mismatch makes the modular
          # `ruby` packages fail transaction check with "No available modular
          # metadata for modular package". Refresh the metadata and pin a valid
          # ruby module stream before installing so the modulemd is present.
          dnf -y clean all
          rm -rf /var/cache/dnf
          dnf -y makecache
          dnf -y install gcc make libacl-devel rpm-build redhat-rpm-config tar
          dnf -y module reset ruby || true
          dnf -y module enable ruby:3.3 || dnf -y module enable ruby:3.1 || true
          dnf -y install ruby ruby-devel
          gem install --no-document fpm

      - name: Install toolchain (Alpine)
        if: matrix.format == 'apk'
        run: |
          # `bash` is required because packager.sh is a bash script (arrays,
          # mapfile); Alpine has no bash by default.
          apk add --no-cache build-base acl-dev ruby ruby-dev libffi-dev tar bash
          gem install --no-document fpm

      - name: Build shared library
        run: make all

      - name: Build ${{ matrix.format }} package
        # Invoke via `bash` so packaging does not depend on the script's
        # executable bit being preserved in the checkout (a missing +x bit was
        # making `./packager.sh` fail with exit code 126, "Permission denied").
        run: bash packager.sh ${{ matrix.format }}

      - name: Upload package to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*.${{ matrix.format }}
          fail_on_unmatched_files: true
