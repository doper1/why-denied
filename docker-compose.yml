# why-denied — local, reproducible test matrix across libc/distro families.
#
# Each service builds a distro image, mounts this repository read-only at /src,
# copies it into a writable tester-owned /work tree, then runs:
#
#     make test
#
# as an unprivileged user (with passwordless sudo for the ownership-forging
# setup steps). This is the EXACT command CI runs, so "works locally == works
# in CI".
#
# Usage:
#   docker compose run --rm test-debian
#   docker compose run --rm test-ubuntu
#   docker compose run --rm test-rocky
#   docker compose run --rm test-rhel
#   docker compose run --rm test-fedora
#   docker compose run --rm test-opensuse
#   docker compose run --rm test-arch
#   docker compose run --rm test-alpine
#
# Or use the convenience wrapper:
#   ./docker-test.sh [debian|ubuntu|rocky|rhel|fedora|opensuse|arch|alpine|all]
#
# Windows (Docker Desktop, PowerShell or Git Bash) works identically, e.g.:
#   docker compose run --rm test-debian

services:
  test-debian:
    build:
      context: .
      dockerfile: docker/Dockerfile.debian
    image: why-denied-test-debian
    volumes:
      - .:/src:ro
    working_dir: /work
    command: ["bash", "-c", "find /src -mindepth 1 -maxdepth 1 ! -name .git -exec cp -rf {} /work/ \\; && make clean && make && make test"]

  test-ubuntu:
    build:
      context: .
      dockerfile: docker/Dockerfile.ubuntu
    image: why-denied-test-ubuntu
    volumes:
      - .:/src:ro
    working_dir: /work
    command: ["bash", "-c", "find /src -mindepth 1 -maxdepth 1 ! -name .git -exec cp -rf {} /work/ \\; && make clean && make && make test"]

  test-rocky:
    build:
      context: .
      dockerfile: docker/Dockerfile.rocky
    image: why-denied-test-rocky
    volumes:
      - .:/src:ro
    working_dir: /work
    command: ["bash", "-c", "find /src -mindepth 1 -maxdepth 1 ! -name .git -exec cp -rf {} /work/ \\; && make clean && make && make test"]

  # RHEL/UBI lacks libacl-devel, so it builds the libacl-free (xattr) variant.
  test-rhel:
    build:
      context: .
      dockerfile: docker/Dockerfile.rhel
    image: why-denied-test-rhel
    volumes:
      - .:/src:ro
    working_dir: /work
    command: ["bash", "-c", "find /src -mindepth 1 -maxdepth 1 ! -name .git -exec cp -rf {} /work/ \\; && make clean && make HAVE_LIBACL=0 && make test"]

  test-fedora:
    build:
      context: .
      dockerfile: docker/Dockerfile.fedora
    image: why-denied-test-fedora
    volumes:
      - .:/src:ro
    working_dir: /work
    command: ["bash", "-c", "find /src -mindepth 1 -maxdepth 1 ! -name .git -exec cp -rf {} /work/ \\; && make clean && make && make test"]

  test-opensuse:
    build:
      context: .
      dockerfile: docker/Dockerfile.opensuse
    image: why-denied-test-opensuse
    volumes:
      - .:/src:ro
    working_dir: /work
    command: ["bash", "-c", "find /src -mindepth 1 -maxdepth 1 ! -name .git -exec cp -rf {} /work/ \\; && make clean && make && make test"]

  # Arch has no native fpm package target (PKGBUILD/AUR), but it builds + passes
  # the suite like any other glibc distro; `acl` bundles headers + setfacl.
  test-arch:
    build:
      context: .
      dockerfile: docker/Dockerfile.arch
    image: why-denied-test-arch
    volumes:
      - .:/src:ro
    working_dir: /work
    command: ["bash", "-c", "find /src -mindepth 1 -maxdepth 1 ! -name .git -exec cp -rf {} /work/ \\; && make clean && make && make test"]

  test-alpine:
    build:
      context: .
      dockerfile: docker/Dockerfile.alpine
    image: why-denied-test-alpine
    volumes:
      - .:/src:ro
    working_dir: /work
    command: ["bash", "-c", "find /src -mindepth 1 -maxdepth 1 ! -name .git -exec cp -rf {} /work/ \\; && make clean && make && make test"]
